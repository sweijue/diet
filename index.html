<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f7f4ef;overscroll-behavior:none}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif}
input,textarea,button,select{font-family:inherit}
input:focus,textarea:focus{outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#c8b89a;border-radius:99px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#f7f4ef;padding-bottom:90px}
#header{background:#2c2416;color:#f7f4ef;position:sticky;top:0;z-index:100;padding:16px 16px 0}
.header-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid #3d3020}
.header-title-sub{font-size:10px;letter-spacing:3px;color:#c8a96e;margin-bottom:1px}
.header-title{font-size:21px;font-weight:800;letter-spacing:-0.5px}
.header-right{display:flex;gap:6px;align-items:center}
.btn-today{background:#c8a96e;color:#2c2416;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:14px}
.btn-dots{background:transparent;color:#c8a96e;border:1.5px solid #3d3020;border-radius:8px;padding:7px 10px;font-weight:700;font-size:17px;line-height:1}
.tab-bar{display:flex}
.tab-btn{flex:1;padding:10px 0;border:none;background:transparent;font-size:15px;font-weight:400;letter-spacing:.5px;color:#5a4a35;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#c8a96e;font-weight:700;border-bottom:2px solid #c8a96e}
#fab{position:fixed;bottom:28px;right:calc(50% - 220px);width:58px;height:58px;border-radius:50%;background:#c8a96e;color:#2c2416;border:none;font-size:30px;box-shadow:0 4px 18px rgba(44,36,22,.35);z-index:150;display:flex;align-items:center;justify-content:center;transition:transform .15s}
#fab:active{transform:scale(.93)}
@media(max-width:480px){#fab{right:20px}}
#fabMenu{position:fixed;bottom:100px;right:calc(50% - 220px);z-index:149;display:none;flex-direction:column;gap:10px;align-items:flex-end}
@media(max-width:480px){#fabMenu{right:20px}}
.fab-item{display:flex;align-items:center;gap:10px;animation:slideUp .2s ease}
.fab-item-label{background:#2c2416;color:#f7f4ef;padding:6px 13px;border-radius:99px;font-size:14px;font-weight:600;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.fab-item-btn{width:46px;height:46px;border-radius:50%;border:none;font-size:20px;box-shadow:0 2px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center}
.dropdown{position:relative}
.dropdown-menu{position:absolute;right:0;top:calc(100% + 6px);background:#2c2416;border:1px solid #3d3020;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45);min-width:170px;z-index:300;animation:slideUp .2s ease}
.dropdown-item{display:block;width:100%;padding:13px 18px;background:none;border:none;color:#f7f4ef;font-size:15px;text-align:left;font-weight:600;border-bottom:1px solid #3d3020}
.dropdown-item:last-child{border-bottom:none}
.storage-bar-wrap{padding:11px 16px 13px;border-top:1px solid #3d3020}
.storage-label{display:flex;justify-content:space-between;font-size:12px;color:#8b6f47;margin-bottom:5px}
.storage-track{height:5px;background:#3d3020;border-radius:99px;overflow:hidden}
.storage-fill{height:100%;border-radius:99px;transition:width .4s}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 6px;position:sticky;top:83px;z-index:50;background:#f7f4ef;border-bottom:1px solid #e8e2d8}
.day-title{display:flex;align-items:center;gap:7px}
.day-dot{width:7px;height:7px;border-radius:50%;background:#c8a96e;animation:pulse 2s infinite;flex-shrink:0}
.day-name{font-weight:800;font-size:18px;color:#2c2416}
.today-badge{font-size:11px;background:#c8a96e;color:#2c2416;padding:2px 8px;border-radius:99px;font-weight:700}
.day-cal{font-size:12px;text-align:right;line-height:1.7}
.timeline-entries{padding:8px 16px;position:relative}
.timeline-line{position:absolute;left:36px;top:0;bottom:0;width:1px;background:#e0d8cc}
.tcard-wrap{position:relative;margin-bottom:11px;overflow:hidden;border-radius:12px}
.tcard-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch;z-index:0}
.tcard-action-edit{background:#c8a96e;color:#2c2416;border:none;padding:0 20px;font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.tcard-action-del{background:#e05555;color:#fff;border:none;padding:0 20px;font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.tcard-action-icon{font-size:18px}
.tcard{display:flex;gap:0;cursor:pointer;position:relative;z-index:1;background:#f7f4ef;transition:transform .25s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.tcard-time{width:50px;flex-shrink:0;text-align:right;padding-right:10px;padding-top:4px;font-size:14px;font-weight:800;color:#2c2416}
.tcard-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;z-index:1;border:2px solid #f7f4ef}
