<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="飲食日誌">
<title>FOOD & LIFE LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f7f4ef;overscroll-behavior:none}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif}
input,textarea,button,select{font-family:inherit}
input:focus,textarea:focus{outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#c8b89a;border-radius:99px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#f7f4ef;padding-bottom:90px}
#header{background:#2c2416;color:#f7f4ef;position:sticky;top:0;z-index:100;padding:16px 16px 0}
.header-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid #3d3020}
.header-title-sub{font-size:10px;letter-spacing:3px;color:#c8a96e;margin-bottom:1px}
.header-title{font-size:21px;font-weight:800;letter-spacing:-0.5px}
.header-right{display:flex;gap:6px;align-items:center}
.btn-today{background:#c8a96e;color:#2c2416;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:14px}
.btn-dots{background:transparent;color:#c8a96e;border:1.5px solid #3d3020;border-radius:8px;padding:7px 10px;font-weight:700;font-size:17px;line-height:1}
.tab-bar{display:flex}
.tab-btn{flex:1;padding:10px 0;border:none;background:transparent;font-size:15px;font-weight:400;letter-spacing:.5px;color:#5a4a35;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#c8a96e;font-weight:700;border-bottom:2px solid #c8a96e}
#fab{position:fixed;bottom:28px;right:calc(50% - 220px);width:58px;height:58px;border-radius:50%;background:#c8a96e;color:#2c2416;border:none;font-size:30px;font-weight:300;box-shadow:0 4px 18px rgba(44,36,22,.35);z-index:150;display:flex;align-items:center;justify-content:center;transition:transform .15s}
#fab:active{transform:scale(.93)}
@media(max-width:480px){#fab{right:20px}}
.dropdown{position:relative}
.dropdown-menu{position:absolute;right:0;top:calc(100% + 6px);background:#2c2416;border:1px solid #3d3020;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45);min-width:170px;z-index:300;animation:slideUp .2s ease}
.dropdown-item{display:block;width:100%;padding:13px 18px;background:none;border:none;color:#f7f4ef;font-size:15px;text-align:left;font-weight:600;border-bottom:1px solid #3d3020}
.dropdown-item:last-child{border-bottom:none}
.storage-bar-wrap{padding:11px 16px 13px;border-top:1px solid #3d3020}
.storage-label{display:flex;justify-content:space-between;font-size:12px;color:#8b6f47;margin-bottom:5px}
.storage-track{height:5px;background:#3d3020;border-radius:99px;overflow:hidden}
.storage-fill{height:100%;border-radius:99px;transition:width .4s}
#fabMenu{position:fixed;bottom:100px;right:calc(50% - 220px);z-index:149;display:none;flex-direction:column;gap:10px;align-items:flex-end}
@media(max-width:480px){#fabMenu{right:20px}}
.fab-item{display:flex;align-items:center;gap:10px;animation:slideUp .2s ease}
.fab-item-label{background:#2c2416;color:#f7f4ef;padding:6px 13px;border-radius:99px;font-size:14px;font-weight:600;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.fab-item-btn{width:46px;height:46px;border-radius:50%;border:none;font-size:20px;box-shadow:0 2px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 6px;position:sticky;top:83px;z-index:50;background:#f7f4ef;border-bottom:1px solid #e8e2d8}
.day-title{display:flex;align-items:center;gap:7px}
.day-dot{width:7px;height:7px;border-radius:50%;background:#c8a96e;animation:pulse 2s infinite;flex-shrink:0}
.day-name{font-weight:800;font-size:18px;color:#2c2416}
.today-badge{font-size:11px;background:#c8a96e;color:#2c2416;padding:2px 8px;border-radius:99px;font-weight:700}
.day-cal{font-size:12px;text-align:right;line-height:1.7}
.timeline-entries{padding:8px 16px;position:relative}
.timeline-line{position:absolute;left:36px;top:0;bottom:0;width:1px;background:#e0d8cc}
.tcard-wrap{position:relative;overflow:hidden;margin-bottom:11px}
.tcard-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch;opacity:0;pointer-events:none;transition:opacity .15s}
.tcard-action-edit{background:#c8a96e;color:#2c2416;border:none;padding:0 18px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.tcard-action-del{background:#e06060;color:#fff;border:none;padding:0 18px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;border-radius:0 12px 12px 0}
.tcard-inner{transition:transform .2s;display:flex;gap:0;cursor:pointer;position:relative;background:transparent}
.tcard-inner.swiped{transform:translateX(-132px)}
.tcard-wrap.swiped .tcard-actions{opacity:1;pointer-events:auto}
.tcard-time{width:50px;flex-shrink:0;text-align:right;padding-right:10px;padding-top:4px;font-size:14px;font-weight:800;color:#2c2416;letter-spacing:0.3px}
.tcard-body{flex:1;margin-left:10px;background:#fff;border-radius:12px;border:1px solid #ece6de;overflow:hidden;box-shadow:0 2px 8px rgba(44,36,22,.06);transition:box-shadow .15s}
.tcard-imgs{display:flex;gap:2px;overflow:hidden}
.tcard-img{flex:1;height:110px;object-fit:cover;display:block;min-width:0}
.tcard-content{padding:9px 12px}
.tcard-row{display:flex;justify-content:space-between;align-items:center}
.tcard-name{font-weight:700;font-size:15px;color:#2c2416}
.tcard-kcal{font-size:13px;color:#5a9a6a;font-weight:700}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{display:inline-block;padding:3px 9px;border-radius:99px;background:#f5f0e8;color:#6b5230;font-size:12px;font-weight:600}
.tcard-sub{font-size:12px;color:#999;margin-top:4px}
.tcard-note{font-size:12px;color:#aaa;font-style:italic;margin-top:4px;border-top:1px solid #f5f0e8;padding-top:4px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 10px;border-bottom:1px solid #e8e2d8}
.cal-nav-btn{background:none;border:none;font-size:26px;color:#8b6f47;padding:4px 12px}
.cal-month{font-weight:700;font-size:19px;color:#2c2416;text-align:center}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:#faf8f5;border-bottom:1px solid #e8e2d8}
.cal-wd{text-align:center;padding:8px 0;font-size:12px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e8e2d8}
.cal-cell{background:#fff;min-height:58px;cursor:pointer;position:relative;overflow:hidden;transition:background .15s}
.cal-cell-inner{position:relative;z-index:1;padding:4px}
.cal-cell-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cal-day-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.cal-dots{display:flex;gap:2px;margin-top:2px}
.cal-dot{width:4px;height:4px;border-radius:50%;display:inline-block}
.cal-selected-header{padding:10px 16px 7px;display:flex;justify-content:space-between;align-items:center;background:#faf8f5;border-top:2px solid #2c2416}
.cal-selected-date{font-weight:700;font-size:16px;color:#2c2416}
.cal-entries{padding:8px 16px 20px; background:#f7f4ef; position:relative;}
.sheet-overlay{position:fixed;inset:0;background:rgba(44,36,22,.65);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.sheet{width:100%;max-width:480px;margin:0 auto;background:#fdf9f4;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;animation:slideUp .28s ease}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e8e2d8;position:sticky;top:0;background:#fdf9f4;z-index:10;border-radius:20px 20px 0 0}
.sheet-cancel{background:none;border:none;color:#8b6f47;font-size:15px}
.sheet-save{background:#c8a96e;border:none;color:#2c2416;border-radius:8px;padding:8px 16px;font-weight:700;font-size:14px}
.type-toggle{display:flex;gap:2px;background:#ece6de;border-radius:8px;padding:3px}
.type-btn{padding:6px 13px;border-radius:6px;border:none;font-weight:700;font-size:14px;transition:all .2s;background:transparent;color:#8b6f47}
.type-btn.active{background:#2c2416;color:#f7f4ef}
.sheet-body{padding:15px 16px 40px}
.form-label{font-size:12px;color:#999;letter-spacing:.5px;margin-bottom:5px;margin-top:2px}
.form-input{width:100%;padding:11px 13px;border-radius:10px;background:#faf8f5;border:1.5px solid #e0d8cc;color:#2c2416;font-size:16px}
.form-textarea{width:100%;padding:11px 13px;border-radius:10px;background:#faf8f5;border:1.5px solid #e0d8cc;color:#2c2416;font-size:16px;resize:none;line-height:1.8}
.datetime-group{background:#f5f0e8;border-radius:12px;padding:4px 0;margin-bottom:14px}
.datetime-row{display:flex;align-items:center}
.datetime-row+.datetime-row{border-top:1px solid #e8e2d8}
.datetime-label{padding:0 13px;font-size:14px;color:#8b6f47;font-weight:600;width:52px;flex-shrink:0}
.datetime-input{flex:1;padding:12px 13px 12px 0;background:transparent;border:none;color:#2c2416;font-size:16px;font-weight:600;min-width:0}
.chip-group{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px}
.chip{padding:7px 13px;border-radius:20px;border:none;font-weight:600;font-size:14px;background:#f5f0e8;color:#8b6f47;transition:all .15s;user-select:none;-webkit-user-select:none}
.chip.active{background:#2c2416;color:#f7f4ef}
.photo-upload{border:2px dashed #d8cfc4;border-radius:12px;padding:22px;text-align:center;cursor:pointer;color:#c8b89a;transition:border-color .2s}
.photo-upload:active{border-color:#c8a96e}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.photo-thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-thumb-remove{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center}
.num-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:13px}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2c2416;color:#c8a96e;padding:11px 22px;border-radius:99px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;white-space:nowrap}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;align-items:center;justify-content:center;animation:fadeIn .2s ease}
#lightbox img{max-width:100%;max-height:100vh;object-fit:contain;border-radius:4px}
#lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lightbox-prev,#lightbox-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lightbox-prev{left:12px}
#lightbox-next{right:12px}
.empty{text-align:center;padding:80px 24px;color:#ccc}
.empty-icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-top">
      <div>
        <div class="header-title-sub">FOOD &amp; LIFE LOG</div>
        <div class="header-title">🥗 Daily Journal</div>
      </div>
      <div class="header-right">
        <button class="btn-today" onclick="goToday()">回到今天</button>
        <div class="dropdown" id="dataDropdown">
          <button class="btn-dots" onclick="toggleDropdown()">⋯</button>
          <div class="dropdown-menu" id="dropdownMenu" style="display:none">
            <div class="storage-bar-wrap">
              <div class="storage-label"><span>已用空間</span><span id="storageText">計算中…</span></div>
              <div class="storage-track"><div class="storage-fill" id="storageFill" style="width:0%;background:#c8a96e"></div></div>
            </div>
            <button class="dropdown-item" onclick="exportData()">📤 匯出備份</button>
            <button class="dropdown-item" onclick="document.getElementById('importInput').click()">📥 匯入資料</button>
            <button class="dropdown-item" onclick="clearAllData()">🗑 全部清除</button>
          </div>
        </div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tabTimeline" onclick="switchTab('timeline')">⏱ 時間線</button>
      <button class="tab-btn" id="tabCalendar" onclick="switchTab('calendar')">📅 日曆</button>
    </div>
  </div>
  <div id="viewTimeline"></div>
  <div id="viewCalendar" style="display:none"></div>
</div>

<button id="fab" onclick="toggleFabMenu()">+</button>
<div id="fabMenu">
  <div class="fab-item">
    <div class="fab-item-label">記錄用餐</div>
    <button class="fab-item-btn" style="background:#c8a96e;color:#2c2416" onclick="openAdd('meal');closeFabMenu()">🍽</button>
  </div>
  <div class="fab-item">
    <div class="fab-item-label">記錄運動</div>
    <button class="fab-item-btn" style="background:#7aaa8a;color:#fff" onclick="openAdd('exercise');closeFabMenu()">🏃</button>
  </div>
</div>

<div id="addSheet" class="sheet-overlay" style="display:none" onclick="closeAddIfBg(event)">
  <div class="sheet">
    <div class="sheet-header">
      <button class="sheet-cancel" onclick="closeAdd()">取消</button>
      <div class="type-toggle">
        <button class="type-btn active" id="typeBtnMeal" onclick="switchType('meal')">🍽 用餐</button>
        <button class="type-btn" id="typeBtnExercise" onclick="switchType('exercise')">🏃 運動</button>
      </div>
      <button class="sheet-save" onclick="saveEntry()">儲存</button>
    </div>
    <div class="sheet-body">
      <div class="datetime-group">
        <div class="datetime-row">
          <span class="datetime-label">日期</span>
          <input type="date" id="fDate" class="datetime-input">
        </div>
        <div class="datetime-row">
          <span class="datetime-label">時間</span>
          <input type="time" id="fTime" class="datetime-input">
        </div>
      </div>
      <div id="mealFields">
        <div class="form-label">餐別</div>
        <div class="chip-group" id="mealTypeChips"></div>
        <div class="form-label">食物（空格分隔不同食物）</div>
        <textarea id="fFoodText" class="form-textarea" rows="3" placeholder="例如：雞胸肉 白飯 花椰菜" oninput="onFoodTextChange()"></textarea>
        <div id="foodTagsRow" style="margin-top:8px"></div>
        <div id="calEstRow" style="display:none;background:#f5f0e8;border-radius:10px;padding:9px 14px;margin-top:6px;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:#8b6f47">估算熱量</span>
          <span id="calEstNum" style="font-size:17px;font-weight:800;color:#2c2416"></span>
        </div>
        <div style="margin-top:14px">
          <div class="form-label">記錄照片</div>
          <div id="photoUploadArea" class="photo-upload" onclick="document.getElementById('photoInput').click()">
            <div style="font-size:28px">📷</div>
          </div>
          <div id="photoGrid" class="photo-grid"></div>
        </div>
        <div class="form-label" style="margin-top:12px">備注</div>
        <textarea id="fNote" class="form-textarea" rows="2" placeholder="備注..."></textarea>
      </div>
      <div id="exerciseFields" style="display:none">
        <div class="form-label">運動類型 (長按自訂項可刪除)</div>
        <div class="chip-group" id="exTypeChips"></div>
        <button onclick="openAddExType()" style="margin-bottom:13px;background:#f5f0e8;color:#8b6f47;border:1.5px dashed #c8b89a;border-radius:20px;padding:7px 13px;font-size:13px;font-weight:600">＋ 自訂類別</button>
        <div class="num-grid">
          <div><div class="form-label">時間(分)</div><input type="number" id="fDuration" class="form-input"></div>
          <div><div class="form-label">距離(km)</div><input type="number" id="fDistance" class="form-input"></div>
          <div><div class="form-label">消耗(kcal)</div><input type="number" id="fCalories" class="form-input"></div>
        </div>
        <div class="form-label">記錄照片</div>
        <div id="exPhotoUploadArea" class="photo-upload" onclick="document.getElementById('exPhotoInput').click()">
          <div style="font-size:28px">📷</div>
        </div>
        <div id="exPhotoGrid" class="photo-grid"></div>
        <div class="form-label" style="margin-top:12px">備注</div>
        <textarea id="fExNote" class="form-textarea" rows="2"></textarea>
      </div>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightboxBg(event)">
  <button id="lightbox-close" onclick="document.getElementById('lightbox').style.display='none'">✕</button>
  <button id="lightbox-prev" onclick="lightboxPrev(event)">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button id="lightbox-next" onclick="lightboxNext(event)">›</button>
</div>

<input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(event, 'meal')">
<input type="file" id="exPhotoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(event, 'exercise')">
<input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
<div id="toast"></div>

<script>
const STORE_KEY='diet_log_v3_demo';
const MEAL_ICONS={'早餐':'☀️','午餐':'🌤️','晚餐':'🌙','點心':'🍡','宵夜':'🌛'};
const MEAL_TYPES=['早餐','午餐','晚餐','點心','宵夜'];
const EX_TYPES_DEFAULT=['跑步','走路','騎車','游泳','重訓','瑜伽','其他'];
const EX_ICONS_DEFAULT={'跑步':'🏃','走路':'🚶','騎車':'🚴','游泳':'🏊','重訓':'💪','瑜伽':'🧘','其他':'⚡'};
const WEEKDAYS=['日','一','二','三','四','五','六'];
const FOOD_DB=[{name:'白飯',cal:180},{name:'雞胸肉',cal:165},{name:'雞蛋',cal:78},{name:'地瓜',cal:130},{name:'拿鐵',cal:150},{name:'蘋果',cal:80},{name:'沙拉',cal:50},{name:'便當',cal:650},{name:'漢堡',cal:450},{name:'麵條',cal:220}];

let entries=[], currentTab='timeline', currentType='meal', editId=null;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSelected=todayDate();
let pendingPhotos=[], exPendingPhotos=[], selectedMealType='早餐', selectedExType='跑步';
let fabOpen=false, swipeData={}, currentSwipedId=null, calDblTapTimer=null;

// --- 初始化與數據 ---
function todayDate(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}
function nowTime(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}
function fmtDate(s){const d=new Date(s+'T00:00:00');return `${d.getMonth()+1}月${d.getDate()}日 週${WEEKDAYS[d.getDay()]}`;}
function uid(){return Date.now()+Math.random();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function loadData(){
  const saved = localStorage.getItem(STORE_KEY);
  if(saved){ entries=JSON.parse(saved); } else { injectDemoData(); }
}
function injectDemoData(){
  const t = new Date();
  const d = (offset) => {
    const target = new Date(t);
    target.setDate(t.getDate() - offset);
    return `${target.getFullYear()}-${pad(target.getMonth()+1)}-${pad(target.getDate())}`;
  };
  entries = [
    {id:1, type:'meal', date:d(0), time:'08:30', mealType:'早餐', foods:[{name:'地瓜',cal:130},{name:'雞蛋',cal:78}], note:'健康早餐', photos:[]},
    {id:2, type:'exercise', date:d(0), time:'18:00', exerciseType:'跑步', duration:'30', distance:'5', calories:'300', note:'公園慢跑', photos:[]},
    {id:3, type:'meal', date:d(1), time:'12:00', mealType:'午餐', foods:[{name:'便當',cal:650}], note:'排骨便當', photos:[]},
    {id:4, type:'meal', date:d(2), time:'19:30', mealType:'晚餐', foods:[{name:'沙拉',cal:150},{name:'雞胸肉',cal:165}], note:'輕食', photos:[]},
    {id:5, type:'exercise', date:d(3), time:'07:00', exerciseType:'走路', duration:'45', distance:'3', calories:'150', note:'上班通勤', photos:[]},
    {id:6, type:'meal', date:d(4), time:'15:00', mealType:'點心', foods:[{name:'蘋果',cal:80}], note:'下午茶', photos:[]}
  ];
  saveEntries();
}
function saveEntries(){localStorage.setItem(STORE_KEY,JSON.stringify(entries));calcStorage();}
function calcStorage(){
  const bytes = new Blob([JSON.stringify(entries)]).size;
  document.getElementById('storageText').textContent = (bytes/1024).toFixed(1) + ' KB';
  document.getElementById('storageFill').style.width = Math.min((bytes/5242880)*100, 100) + '%';
}

// --- 渲染邏輯 ---
function switchTab(tab){
  currentTab=tab;
  document.getElementById('viewTimeline').style.display=tab==='timeline'?'block':'none';
  document.getElementById('viewCalendar').style.display=tab==='calendar'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  if(tab==='calendar') renderCalendar(); else renderTimeline();
}

function renderTimeline(){
  const el = document.getElementById('viewTimeline');
  const g = grouped();
  const dates = Object.keys(g).sort((a,b)=>b.localeCompare(a));
  if(!dates.length){ el.innerHTML='<div class="empty">📓 尚無記錄</div>'; return; }
  el.innerHTML = dates.map(date => {
    const isTd = date === todayDate();
    const dayCal = g[date].reduce((sum,e)=>sum + (e.type==='meal'?(e.foods||[]).reduce((s,f)=>s+f.cal,0):0),0);
    return `<div class="day-header"><div class="day-title">${isTd?'<span class="day-dot"></span>':''}<span class="day-name">${fmtDate(date)}</span></div><div class="day-cal">${dayCal} kcal</div></div>
            <div class="timeline-entries"><div class="timeline-line"></div>${g[date].sort((a,b)=>a.time.localeCompare(b.time)).map(e=>renderCard(e)).join('')}</div>`;
  }).join('');
}

function renderCard(e){
  const isMeal = e.type==='meal';
  const icon = isMeal ? (MEAL_ICONS[e.mealType]||'🍽') : (getExIcons()[e.exerciseType]||'⚡');
  const name = isMeal ? e.mealType : e.exerciseType;
  const kcal = isMeal ? (e.foods||[]).reduce((s,f)=>s+f.cal,0) : e.calories;
  const kcalText = kcal ? `<span class="tcard-kcal">${isMeal?'':'−'}${kcal} kcal</span>` : '';
  const photoHtml = (e.photos&&e.photos.length) ? `<div class="tcard-imgs">${e.photos.slice(0,3).map((p,i)=>`<img class="tcard-img" src="${p}" onclick="openLightboxFromCard('${e.id}',${i})">`).join('')}</div>` : '';
  
  return `<div class="tcard-wrap" id="twrap-${e.id}">
            <div class="tcard-inner" id="tinner-${e.id}" ontouchstart="swipeStart(event,'${e.id}')" ontouchmove="swipeMove(event,'${e.id}')" ontouchend="swipeEnd(event,'${e.id}')">
              <div class="tcard-time">${e.time}</div>
              <div style="width:10px;height:10px;border-radius:50%;background:${isMeal?'#c8a96e':'#7aaa8a'};margin-top:6px;z-index:1;border:2px solid #f7f4ef"></div>
              <div class="tcard-body" onclick="editEntry('${e.id}')">
                ${photoHtml}
                <div class="tcard-content">
                  <div class="tcard-row"><span class="tcard-name">${icon} ${name}</span>${kcalText}</div>
                  ${isMeal?`<div class="tags">${(e.foods||[]).map(f=>`<span class="tag">${f.name}</span>`).join('')}</div>`:`<div class="tcard-sub">${e.duration?e.duration+'分':''}${e.distance?' · '+e.distance+'km':''}</div>`}
                  ${e.note?`<div class="tcard-note">${esc(e.note)}</div>`:''}
                </div>
              </div>
            </div>
            <div class="tcard-actions">
              <button class="tcard-action-edit" onclick="editEntry('${e.id}')">✏️</button>
              <button class="tcard-action-del" onclick="deleteEntry('${e.id}')">🗑</button>
            </div>
          </div>`;
}

function renderCalendar(){
  const el = document.getElementById('viewCalendar');
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  let cells = [];
  for(let i=0; i<firstDay; i++) cells.push('<div class="cal-cell" style="background:#f3f0ea"></div>');
  for(let d=1; d<=daysInMonth; d++){
    const ds = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const isSel = ds === calSelected;
    const g = grouped()[ds];
    const photo = g && g.find(e=>e.photos?.length)?.photos[0];
    const hasData = g && g.length > 0;
    cells.push(`<div class="cal-cell" onclick="selectCalDay('${ds}')" style="${isSel?'background:#2c2416;color:#fff':''}">
                  ${photo?`<img src="${photo}" class="cal-cell-photo" style="opacity:${isSel?0.3:0.6}">`:''}
                  <div class="cal-cell-inner">
                    <div class="cal-day-num">${d}</div>
                    ${(hasData&&!photo)?`<div class="cal-dots">${g.slice(0,3).map(e=>`<span class="cal-dot" style="background:${e.type==='meal'?'#c8a96e':'#7aaa8a'}"></span>`).join('')}</div>`:''}
                  </div>
                </div>`);
  }
  el.innerHTML = `<div class="cal-nav"><button onclick="calShift(-1)">‹</button><div>${calYear}年 ${calMonth+1}月</div><button onclick="calShift(1)">›</button></div>
                  <div class="cal-weekdays">${WEEKDAYS.map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div>
                  <div class="cal-grid">${cells.join('')}</div>
                  <div class="cal-selected-header"><div class="cal-selected-date">${fmtDate(calSelected)}</div></div>
                  <div class="cal-entries">${(grouped()[calSelected]||[]).sort((a,b)=>a.time.localeCompare(b.time)).map(e=>renderCard(e)).join('')}</div>`;
}

function grouped(){
  const g = {};
  entries.forEach(e => { (g[e.date] = g[e.date] || []).push(e); });
  return g;
}

// --- 操作邏輯 ---
function calShift(n){ calMonth+=n; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function selectCalDay(ds){ calSelected=ds; renderCalendar(); }
function goToday(){ calYear=new Date().getFullYear(); calMonth=new Date().getMonth(); calSelected=todayDate(); if(currentTab==='calendar') renderCalendar(); else renderTimeline(); }

function toggleFabMenu(){ fabOpen=!fabOpen; document.getElementById('fabMenu').style.display=fabOpen?'flex':'none'; document.getElementById('fab').style.transform=fabOpen?'rotate(45deg)':'none'; }
function closeFabMenu(){ fabOpen=false; document.getElementById('fabMenu').style.display='none'; document.getElementById('fab').style.transform='none'; }

function openAdd(type){
  editId=null; currentType=type;
  document.getElementById('fDate').value=calSelected;
  document.getElementById('fTime').value=nowTime();
  document.getElementById('fFoodText').value='';
  document.getElementById('fNote').value='';
  document.getElementById('fExNote').value='';
  pendingPhotos=[]; exPendingPhotos=[];
  renderPhotoGrid(); setType(type); renderChips();
  document.getElementById('addSheet').style.display='flex';
}
function closeAdd(){ document.getElementById('addSheet').style.display='none'; }
function setType(t){
  currentType=t;
  document.getElementById('typeBtnMeal').className='type-btn'+(t==='meal'?' active':'');
  document.getElementById('typeBtnExercise').className='type-btn'+(t==='exercise'?' active':'');
  document.getElementById('mealFields').style.display=t==='meal'?'block':'none';
  document.getElementById('exerciseFields').style.display=t==='exercise'?'block':'none';
}
function switchType(t){ setType(t); renderChips(); }

function renderChips(){
  document.getElementById('mealTypeChips').innerHTML=MEAL_TYPES.map(m=>`<button class="chip${m===selectedMealType?' active':''}" onclick="selectedMealType='${m}';renderChips()">${m}</button>`).join('');
  const exIcons = getExIcons();
  document.getElementById('exTypeChips').innerHTML=getExTypes().map(t=>`
    <button class="chip${t===selectedExType?' active':''}" 
      onclick="selectedExType='${t}';renderChips()" 
      oncontextmenu="deleteExType(event,'${t}')" 
      ontouchstart="handleExTouchStart(event,'${t}')" 
      ontouchend="handleExTouchEnd()">
      ${exIcons[t]||'⚡'} ${t}
    </button>`).join('');
}

let exTouchTimer;
function handleExTouchStart(e, t){ exTouchTimer = setTimeout(()=>deleteExType(null, t), 800); }
function handleExTouchEnd(){ clearTimeout(exTouchTimer); }
function deleteExType(e, t){
  if(e) e.preventDefault();
  if(EX_TYPES_DEFAULT.includes(t)) return;
  if(confirm(`刪除自訂類別「${t}」？`)){
    const customs = JSON.parse(localStorage.getItem('ex_customs')||'[]');
    localStorage.setItem('ex_customs', JSON.stringify(customs.filter(c=>c.name!==t)));
    renderChips();
  }
}

function openAddExType(){
  const n = prompt('輸入名稱'); if(!n) return;
  const i = prompt('輸入圖標(Emoji)', '⚡');
  const customs = JSON.parse(localStorage.getItem('ex_customs')||'[]');
  customs.push({name:n, icon:i});
  localStorage.setItem('ex_customs', JSON.stringify(customs));
  selectedExType=n; renderChips();
}
function getExTypes(){ return [...EX_TYPES_DEFAULT, ...JSON.parse(localStorage.getItem('ex_customs')||'[]').map(c=>c.name)]; }
function getExIcons(){ 
  const icons = {...EX_ICONS_DEFAULT}; 
  JSON.parse(localStorage.getItem('ex_customs')||'[]').forEach(c=>icons[c.name]=c.icon);
  return icons;
}

function onFoodTextChange(){
  const val = document.getElementById('fFoodText').value;
  const foods = val.split(/\s+/).filter(x=>x);
  let total = 0;
  const tags = foods.map(f=>{
    const match = FOOD_DB.find(d=>d.name===f);
    if(match) total+=match.cal;
    return `<span class="tag" style="${match?'background:#e8f0e8':''}">${f}</span>`;
  });
  document.getElementById('foodTagsRow').innerHTML = `<div class="tags">${tags.join('')}</div>`;
  if(total){
    document.getElementById('calEstRow').style.display='flex';
    document.getElementById('calEstNum').textContent = total + ' kcal';
  } else {
    document.getElementById('calEstRow').style.display='none';
  }
}

function saveEntry(){
  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  if(!date || !time) return;
  
  let entry = {
    id: editId || uid(),
    date, time, type: currentType
  };
  
  if(currentType==='meal'){
    entry.mealType = selectedMealType;
    entry.note = document.getElementById('fNote').value;
    entry.photos = pendingPhotos;
    entry.foods = document.getElementById('fFoodText').value.split(/\s+/).filter(x=>x).map(f=>{
      const m = FOOD_DB.find(d=>d.name===f);
      return {name:f, cal: m?m.cal:0};
    });
  } else {
    entry.exerciseType = selectedExType;
    entry.duration = document.getElementById('fDuration').value;
    entry.distance = document.getElementById('fDistance').value;
    entry.calories = document.getElementById('fCalories').value;
    entry.note = document.getElementById('fExNote').value;
    entry.photos = exPendingPhotos;
  }
  
  if(editId) entries = entries.map(e=>e.id==editId?entry:e);
  else entries.push(entry);
  
  saveEntries(); closeAdd(); 
  if(currentTab==='calendar') renderCalendar(); else renderTimeline();
}

function deleteEntry(id){
  if(confirm('確定刪除？')){
    entries = entries.filter(e=>e.id!=id);
    saveEntries();
    if(currentTab==='calendar') renderCalendar(); else renderTimeline();
  }
}

function editEntry(id){
  const e = entries.find(x=>x.id==id); if(!e) return;
  editId = id; setType(e.type);
  document.getElementById('fDate').value = e.date;
  document.getElementById('fTime').value = e.time;
  if(e.type==='meal'){
    selectedMealType = e.mealType;
    document.getElementById('fFoodText').value = e.foods.map(f=>f.name).join(' ');
    document.getElementById('fNote').value = e.note;
    pendingPhotos = [...e.photos]; renderPhotoGrid(); onFoodTextChange();
  } else {
    selectedExType = e.exerciseType;
    document.getElementById('fDuration').value = e.duration;
    document.getElementById('fDistance').value = e.distance;
    document.getElementById('fCalories').value = e.calories;
    document.getElementById('fExNote').value = e.note;
    exPendingPhotos = [...e.photos]; renderPhotoGrid();
  }
  renderChips();
  document.getElementById('addSheet').style.display='flex';
}

function handlePhotos(ev, type){
  const files = Array.from(ev.target.files);
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w=img.width, h=img.height, max=800;
        if(w>h){ if(w>max){h*=max/w; w=max;} } else { if(h>max){w*=max/h; h=max;} }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const data = canvas.toDataURL('image/jpeg', 0.8);
        if(type==='meal') { pendingPhotos.push(data); renderPhotoGrid(); }
        else { exPendingPhotos.push(data); renderPhotoGrid(); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function renderPhotoGrid(){
  const target = currentType==='meal' ? 'photoGrid' : 'exPhotoGrid';
  const photos = currentType==='meal' ? pendingPhotos : exPendingPhotos;
  document.getElementById(target).innerHTML = photos.map((p,i)=>`<div class="photo-thumb"><img src="${p}"><button class="photo-thumb-remove" onclick="removePhoto(${i})">✕</button></div>`).join('');
}
function removePhoto(i){
  if(currentType==='meal') pendingPhotos.splice(i,1); else exPendingPhotos.splice(i,1);
  renderPhotoGrid();
}

// --- 側滑編輯 ---
function swipeStart(ev,id){ const t=ev.touches[0]; swipeData[id]={x:t.clientX, y:t.clientY, moved:false}; }
function swipeMove(ev,id){
  const d=swipeData[id]; if(!d) return;
  const dx=ev.touches[0].clientX-d.x; const dy=Math.abs(ev.touches[0].clientY-d.y);
  if(dy>20) return;
  if(Math.abs(dx)>10){ d.moved=true; ev.preventDefault(); }
  const el=document.getElementById('tinner-'+id);
  const offset = Math.max(-132, Math.min(0, dx + (currentSwipedId===id?-132:0)));
  el.style.transform = `translateX(${offset}px)`;
  el.style.transition = 'none';
}
function swipeEnd(ev,id){
  const el=document.getElementById('tinner-'+id); const d=swipeData[id]; if(!el||!d) return;
  el.style.transition = 'transform 0.2s';
  const dx = ev.changedTouches[0].clientX - d.x;
  if(dx < -50){ el.classList.add('swiped'); currentSwipedId=id; }
  else { el.classList.remove('swiped'); el.style.transform=''; currentSwipedId=null; }
}

// --- 其他功能 ---
function toggleDropdown(){ const m=document.getElementById('dropdownMenu'); m.style.display=m.style.display==='none'?'block':'none'; }
function exportData(){
  const blob = new Blob([JSON.stringify(entries)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='log.json'; a.click();
}
function importData(ev){
  const reader = new FileReader();
  reader.onload = e => { entries=JSON.parse(e.target.result); saveEntries(); renderTimeline(); };
  reader.readAsText(ev.target.files[0]);
}
function clearAllData(){ if(confirm('確定清除全部？')){ entries=[]; saveEntries(); renderTimeline(); } }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }

// --- Lightbox ---
let lbPhotos=[], lbIdx=0;
function openLightboxFromCard(id, idx){
  const e = entries.find(x=>x.id==id); if(!e) return;
  lbPhotos = e.photos; lbIdx = idx;
  document.getElementById('lightbox-img').src = lbPhotos[lbIdx];
  document.getElementById('lightbox').style.display='flex';
}
function lightboxPrev(e){ e.stopPropagation(); lbIdx=(lbIdx-1+lbPhotos.length)%lbPhotos.length; document.getElementById('lightbox-img').src=lbPhotos[lbIdx]; }
function lightboxNext(e){ e.stopPropagation(); lbIdx=(lbIdx+1)%lbPhotos.length; document.getElementById('lightbox-img').src=lbPhotos[lbIdx]; }
function closeLightboxBg(e){ if(e.target.id==='lightbox') document.getElementById('lightbox').style.display='none'; }
function closeAddIfBg(e){ if(e.target.id==='addSheet') closeAdd(); }

// --- Init ---
loadData();
renderTimeline();
</script>
